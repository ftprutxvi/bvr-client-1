<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BVR Kitchen Dashboard</title>
    <meta name="description" content="Kitchen dashboard for BVR Restaurant. Manage cooking orders." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap');

        :root {
            --bg: #0a0500;
            --card-bg: #1a0e00;
            --border: #d4a01740;
            --gold: #d4a017;
            --bright-gold: #f5c842;
            --text: #f5e6c8;
            --muted: #a07840;
            --green: #22c55e;
            --red: #ef4444
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden
        }

        h1,
        h2,
        h3 {
            font-family: 'Playfair Display', serif
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: #0a050095;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 16px;
            margin-bottom: 12px
        }

        .btn-gold {
            background: linear-gradient(135deg, #d4a017, #f5c842);
            color: #1a0e00;
            font-weight: 700;
            border-radius: 9999px;
            min-height: 48px;
            padding: 12px 24px;
            border: none;
            cursor: pointer;
            transition: all .2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            width: 100%
        }

        .btn-gold:hover {
            box-shadow: 0 0 25px #d4a01780;
            transform: translateY(-2px)
        }

        .input-field {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #0f0700;
            color: var(--text);
            font-size: .95rem;
            font-family: 'Poppins', sans-serif;
            min-height: 48px;
            outline: none;
            transition: border-color .2s
        }

        .input-field:focus {
            border-color: var(--gold)
        }

        .input-field::placeholder {
            color: #a0784080
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 16px
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            text-align: center
        }

        .stat-num {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--bright-gold);
            font-family: 'Playfair Display', serif
        }

        .stat-label {
            font-size: .7rem;
            color: var(--muted)
        }

        /* Action buttons */
        .act-btn {
            padding: 10px 18px;
            border-radius: 9999px;
            border: none;
            font-size: .82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            min-height: 40px;
            font-family: 'Poppins', sans-serif;
            width: 100%
        }

        .act-cook {
            background: linear-gradient(135deg, #f97316, #fb923c);
            color: #fff
        }

        .act-ready {
            background: linear-gradient(135deg, #22c55e, #4ade80);
            color: #fff
        }

        /* Timer */
        .kitchen-timer {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--bright-gold);
            font-family: 'Playfair Display', serif;
            text-align: center;
            padding: 4px 0
        }

        .timer-warning {
            color: var(--red) !important
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 9999px;
            font-size: .7rem;
            font-weight: 600;
            white-space: nowrap
        }

        /* Password overlay */
        .password-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .9);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px
        }

        .password-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 32px;
            max-width: 360px;
            width: 100%;
            text-align: center
        }

        /* Skeleton loading */
        .skeleton-box {
            background: linear-gradient(90deg, #1a0e00 25%, #2a1800 50%, #1a0e00 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }
    </style>
</head>

<body>

    <!-- PASSWORD OVERLAY -->
    <div class="password-overlay" id="passwordOverlay">
        <div class="password-box">
            <div style="font-size:2.5rem;margin-bottom:12px;">👨‍🍳</div>
            <h2 style="color:var(--gold);margin-bottom:20px;font-size:1.3rem;">Kitchen Access</h2>
            <input type="password" class="input-field" id="kitchenPassword" placeholder="Enter kitchen password"
                style="text-align:center;margin-bottom:12px;" />
            <button class="btn-gold" onclick="checkPassword()">🔓 Enter Kitchen</button>
            <p id="passErr" style="color:var(--red);font-size:.8rem;margin-top:8px;display:none;"></p>
        </div>
    </div>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div style="max-width:1200px;margin:auto;display:flex;align-items:center;justify-content:space-between;">
            <h1 style="font-size:1.15rem;color:#d4a017;">👨‍🍳 Kitchen</h1>
            <div style="display:flex;align-items:center;gap:12px;">
                <span style="font-size:.75rem;color:var(--muted);" id="lastUpdate">Updated just now</span>
                <a href="#" onclick="lockKitchen()" style="color:var(--muted);text-decoration:none;font-size:.85rem;">🔒
                    Lock</a>
            </div>
        </div>
    </nav>

    <main style="padding:80px 16px 32px;max-width:800px;margin:auto;">

        <!-- STATS -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-num" id="countQueue">0</div>
                <div class="stat-label">In Queue</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="countCooking">0</div>
                <div class="stat-label">Cooking</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="countReady">0</div>
                <div class="stat-label">Ready</div>
            </div>
        </div>

        <!-- KITCHEN ORDERS -->
        <div id="kitchenOrders">
            <!-- Skeleton cards -->
            <div class="card">
                <div class="skeleton-box" style="height:20px;width:40%;margin-bottom:10px;"></div>
                <div class="skeleton-box" style="height:14px;width:80%;margin-bottom:6px;"></div>
                <div class="skeleton-box" style="height:40px;width:100%;"></div>
            </div>
            <div class="card">
                <div class="skeleton-box" style="height:20px;width:40%;margin-bottom:10px;"></div>
                <div class="skeleton-box" style="height:14px;width:80%;margin-bottom:6px;"></div>
                <div class="skeleton-box" style="height:40px;width:100%;"></div>
            </div>
        </div>

        <!-- AUTO REFRESH NOTE -->
        <p style="text-align:center;color:var(--muted);font-size:.75rem;margin-top:16px;">
            🔄 Auto-refreshes every 10 seconds · Timers tick every second
        </p>

    </main>

    <script>
        // ========== SUPABASE INIT ==========
        const SUPABASE_URL = 'https://feglxiibeuzsahoevzuu.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZlZ2x4aWliZXV6c2Fob2V2enV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTg3MzMsImV4cCI6MjA4ODc5NDczM30.GhrRdA0q4jFKDCJaw4CNFsz3tag4mZiVqvhx2NsaL9U';
        const { createClient } = supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ========== SHARED UTILITIES ==========
        function formatPrice(amount) { return '₹' + amount; }
        function timeAgo(isoString) {
            try {
                const diff = Math.floor((Date.now() - new Date(isoString).getTime()) / 1000);
                if (diff < 60) return diff + 's ago';
                if (diff < 3600) return Math.floor(diff / 60) + ' mins ago';
                if (diff < 86400) return Math.floor(diff / 3600) + ' hrs ago';
                return Math.floor(diff / 86400) + ' days ago';
            } catch (e) { return '—'; }
        }
        function showToast(message, type = 'success') {
            const existing = document.getElementById('bvr-toast');
            if (existing) existing.remove();
            const colors = { success: '#d4a017', error: '#ef4444', info: '#3b82f6' };
            const toast = document.createElement('div');
            toast.id = 'bvr-toast';
            toast.textContent = message;
            Object.assign(toast.style, {
                position: 'fixed', bottom: '80px', left: '50%', transform: 'translateX(-50%)',
                background: colors[type] || colors.success, color: type === 'success' ? '#1a0e00' : '#fff',
                padding: '10px 24px', borderRadius: '9999px', fontFamily: "'Poppins',sans-serif",
                fontSize: '.85rem', fontWeight: '600', zIndex: '999', whiteSpace: 'nowrap',
                boxShadow: '0 4px 20px rgba(0,0,0,0.4)', transition: 'opacity 0.3s ease', opacity: '1'
            });
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        // ========== AUTH ==========
        function checkPassword() {
            const pw = document.getElementById('kitchenPassword').value;
            const errEl = document.getElementById('passErr');
            errEl.style.display = 'none';

            if (pw === 'bvr123') {
                localStorage.setItem('bvr_kitchen_auth', 'true');
                document.getElementById('passwordOverlay').style.display = 'none';
                showToast('Welcome to Kitchen! 👨‍🍳');
                loadKitchenOrders();
            } else {
                errEl.textContent = 'Wrong password. Try again.';
                errEl.style.display = 'block';
            }
        }

        function lockKitchen() {
            localStorage.removeItem('bvr_kitchen_auth');
            document.getElementById('passwordOverlay').style.display = 'flex';
        }

        // Enter key on password field
        document.getElementById('kitchenPassword').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') checkPassword();
        });

        // ========== KITCHEN ORDERS ==========
        let kitchenOrders = [];
        let lastKitchenState = '';

        async function loadKitchenOrders() {
            try {
                const { data: orders, error } = await db
                    .from('orders')
                    .select('*, order_items(*)')
                    .in('status', ['CONFIRMED', 'IN_KITCHEN'])
                    .order('created_at', { ascending: true });

                if (error) {
                    showToast('Failed to load orders', 'error');
                    console.error('[BVR] Kitchen fetch error:', error);
                    return;
                }

                kitchenOrders = orders || [];

                // Smart diff: only re-render if state changed
                const stateKey = kitchenOrders.map(o => o.id + ':' + o.status).join(',');
                if (stateKey === lastKitchenState) {
                    updateTimers();
                    updateStats();
                    return;
                }

                lastKitchenState = stateKey;
                renderKitchenOrders();
                updateStats();
                updateTimers();

                document.getElementById('lastUpdate').textContent = 'Updated just now';
                console.log('[BVR] Kitchen orders loaded:', kitchenOrders.length);

            } catch (err) {
                console.error('[BVR] Network error:', err);
                showToast('No internet. Retrying in 5s...', 'error');
                setTimeout(loadKitchenOrders, 5000);
            }
        }

        function renderKitchenOrders() {
            const container = document.getElementById('kitchenOrders');

            if (kitchenOrders.length === 0) {
                container.innerHTML = `
                    <div class="card" style="text-align:center;padding:40px 20px;">
                        <div style="font-size:2.5rem;margin-bottom:12px;">✅</div>
                        <h3 style="color:var(--green);font-size:1.1rem;margin-bottom:8px;">All caught up!</h3>
                        <p style="color:var(--muted);font-size:.85rem;">No orders in queue. Waiting for new orders...</p>
                    </div>`;
                return;
            }

            container.innerHTML = kitchenOrders.map(o => {
                const items = (o.order_items || []).map(i =>
                    `<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:.82rem;">
                        <span>${i.item_name}</span>
                        <span style="color:var(--bright-gold);font-weight:600;">×${i.quantity}</span>
                    </div>`
                ).join('');

                const isCooking = o.status === 'IN_KITCHEN';
                const statusColor = isCooking ? '#f97316' : '#3b82f6';
                const statusText = isCooking ? '🔥 COOKING' : '⏳ IN QUEUE';

                // Timer
                let timerHTML = '';
                let actionBtn = '';

                if (isCooking && o.cook_started_at) {
                    timerHTML = `<div class="kitchen-timer" data-start="${o.cook_started_at}">00:00</div>`;
                    actionBtn = `<button class="act-btn act-ready" onclick="updateKitchenStatus('${o.id}','READY')">✅ Mark Ready</button>`;
                } else if (isCooking) {
                    timerHTML = `<div class="kitchen-timer">00:00</div>`;
                    actionBtn = `<button class="act-btn act-ready" onclick="updateKitchenStatus('${o.id}','READY')">✅ Mark Ready</button>`;
                } else {
                    actionBtn = `<button class="act-btn act-cook" onclick="updateKitchenStatus('${o.id}','IN_KITCHEN')">🔥 Start Cooking</button>`;
                }

                return `
                    <div class="card">
                        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
                            <div>
                                <h3 style="font-size:.95rem;color:var(--gold);">#${o.order_code}</h3>
                                <div style="font-size:.72rem;color:var(--muted);">${timeAgo(o.created_at)} · ${o.type === 'delivery' ? '🛵 Delivery' : '🪑 Table ' + (o.table_number || '?')}</div>
                            </div>
                            <span class="badge" style="background:${statusColor}20;color:${statusColor};">${statusText}</span>
                        </div>
                        <div style="border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:10px;">
                            ${items}
                        </div>
                        ${timerHTML}
                        ${actionBtn}
                    </div>`;
            }).join('');
        }

        // ========== STATUS UPDATE ==========
        async function updateKitchenStatus(orderId, newStatus) {
            const updateData = { status: newStatus };
            if (newStatus === 'IN_KITCHEN') {
                updateData.cook_started_at = new Date().toISOString();
            }

            try {
                const { error } = await db
                    .from('orders')
                    .update(updateData)
                    .eq('id', orderId);

                if (error) {
                    showToast('Update failed', 'error');
                    console.error('[BVR] Kitchen update error:', error);
                    return;
                }

                const msg = newStatus === 'IN_KITCHEN' ? '🔥 Cooking started!' : '✅ Marked as ready!';
                showToast(msg);

                // Force re-render
                lastKitchenState = '';
                await loadKitchenOrders();

            } catch (err) {
                console.error('[BVR] Network error:', err);
                showToast('Network error. Try again.', 'error');
            }
        }

        // ========== TIMER ==========
        function updateTimers() {
            document.querySelectorAll('.kitchen-timer[data-start]').forEach(el => {
                const start = new Date(el.dataset.start).getTime();
                const elapsed = Math.floor((Date.now() - start) / 1000);
                const mins = Math.floor(elapsed / 60);
                const secs = elapsed % 60;
                el.textContent = String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');

                // Warning after 15 minutes
                if (elapsed > 900) {
                    el.classList.add('timer-warning');
                } else {
                    el.classList.remove('timer-warning');
                }
            });
        }

        function updateStats() {
            const queue = kitchenOrders.filter(o => o.status === 'CONFIRMED').length;
            const cooking = kitchenOrders.filter(o => o.status === 'IN_KITCHEN').length;

            document.getElementById('countQueue').textContent = queue;
            document.getElementById('countCooking').textContent = cooking;

            // For "Ready" count, we need a separate query or we just show 0
            // Since kitchen view focuses on CONFIRMED + IN_KITCHEN, we can show ready separately
            document.getElementById('countReady').textContent = '-';
        }

        // Also count ready orders for stats
        async function loadReadyCount() {
            try {
                const { count } = await db
                    .from('orders')
                    .select('*', { count: 'exact', head: true })
                    .eq('status', 'READY');
                document.getElementById('countReady').textContent = count || 0;
            } catch (e) { /* silent */ }
        }

        // ========== AUTO REFRESH ==========
        setInterval(() => {
            if (localStorage.getItem('bvr_kitchen_auth') === 'true') {
                loadKitchenOrders();
                loadReadyCount();
            }
        }, 10000);

        // Timer tick every second
        setInterval(updateTimers, 1000);

        // ========== INIT ==========
        if (localStorage.getItem('bvr_kitchen_auth') === 'true') {
            document.getElementById('passwordOverlay').style.display = 'none';
            loadKitchenOrders();
            loadReadyCount();
        }
        console.log('[BVR] Kitchen dashboard loaded');
    </script>
</body>

</html>
