<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BVR Menu — Order Food Online</title>
    <meta name="description"
        content="Browse the BVR Bangaru Vakili menu. Biryani, starters, curries & more. Order online for dine-in or delivery." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap');

        :root {
            --bg: #0a0500;
            --card-bg: #1a0e00;
            --border: #d4a01740;
            --gold: #d4a017;
            --bright-gold: #f5c842;
            --text: #f5e6c8;
            --muted: #a07840;
            --green: #22c55e;
            --red: #ef4444
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Playfair Display', serif
        }

        .gold-glow {
            box-shadow: 0 0 20px #d4a01760
        }

        .btn-gold {
            background: linear-gradient(135deg, #d4a017, #f5c842);
            color: #1a0e00;
            font-weight: 700;
            border-radius: 9999px;
            min-height: 48px;
            padding: 12px 24px;
            border: none;
            cursor: pointer;
            transition: all .2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            text-decoration: none
        }

        .btn-gold:hover {
            box-shadow: 0 0 25px #d4a01780;
            transform: translateY(-2px)
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: #0a050095;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px
        }

        /* Category tabs */
        .tabs-wrap {
            position: sticky;
            top: 64px;
            z-index: 90;
            background: #0a0500ee;
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            overflow-x: auto;
            display: flex;
            gap: 8px;
            -webkit-overflow-scrolling: touch
        }

        .tabs-wrap::-webkit-scrollbar {
            display: none
        }

        .tab-btn {
            flex-shrink: 0;
            padding: 8px 18px;
            border-radius: 9999px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-size: .85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s ease;
            font-family: 'Poppins', sans-serif;
            white-space: nowrap
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #d4a017, #f5c842);
            color: #1a0e00;
            border-color: transparent;
            font-weight: 600
        }

        /* Menu grid */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 16px
        }

        .menu-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 16px;
            transition: all .2s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between
        }

        .menu-card:hover {
            box-shadow: 0 0 15px #d4a01720
        }

        /* Quantity controls */
        .qty-wrap {
            display: flex;
            align-items: center;
            gap: 0;
            border-radius: 9999px;
            overflow: hidden;
            border: 1px solid var(--gold)
        }

        .qty-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #d4a017, #f5c842);
            color: #1a0e00;
            font-weight: 700;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            transition: all .2s
        }

        .qty-num {
            width: 32px;
            text-align: center;
            font-weight: 600;
            color: var(--bright-gold);
            font-size: .95rem;
            background: transparent
        }

        /* Add button */
        .add-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4a017, #f5c842);
            color: #1a0e00;
            font-weight: 700;
            font-size: 1.3rem;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .2s
        }

        .add-btn:hover {
            box-shadow: 0 0 12px #d4a01760;
            transform: scale(1.1)
        }

        /* Floating cart */
        .float-cart {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 90;
            display: none;
            animation: slideUp .3s ease
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0)
            }
        }

        /* Skeleton loading */
        .skeleton-box {
            background: linear-gradient(90deg, #1a0e00 25%, #2a1800 50%, #1a0e00 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        @media(min-width:640px) {
            .menu-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 16px;
                max-width: 900px;
                margin: auto
            }
        }

        @media(min-width:1024px) {
            .menu-grid {
                grid-template-columns: repeat(4, 1fr);
                max-width: 1100px
            }
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div style="max-width:1200px;margin:auto;display:flex;align-items:center;justify-content:space-between;">
            <a href="index.html"
                style="color:#d4a017;text-decoration:none;font-size:1.4rem;display:flex;align-items:center;gap:8px;">
                ← <span style="font-size:0.9rem;color:#f5e6c8;">Back</span>
            </a>
            <h1 style="font-size:1.15rem;color:#d4a017;">BVR Menu</h1>
            <div style="position:relative;">
                <a href="cart.html" style="color:#d4a017;text-decoration:none;font-size:1.5rem;" id="cartIcon">🛒</a>
                <span id="cartBadge"
                    style="position:absolute;top:-6px;right:-10px;background:#ef4444;color:#fff;font-size:0.65rem;font-weight:700;width:18px;height:18px;border-radius:50%;display:none;align-items:center;justify-content:center;">0</span>
            </div>
        </div>
    </nav>

    <!-- CATEGORY TABS -->
    <div class="tabs-wrap" style="margin-top:64px;" id="tabsWrap">
        <button class="tab-btn active" data-cat="all">All</button>
    </div>

    <!-- MENU GRID -->
    <div class="menu-grid" id="menuGrid"></div>

    <!-- FLOATING CART BUTTON -->
    <div class="float-cart" id="floatCart">
        <a href="cart.html" class="btn-gold gold-glow" style="padding:14px 28px;font-size:1rem;">
            <span id="floatCartText">View Cart (0 items) → ₹0</span>
        </a>
    </div>

    <script>
        // ========== SUPABASE INIT ==========
        const SUPABASE_URL = 'https://feglxiibeuzsahoevzuu.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZlZ2x4aWliZXV6c2Fob2V2enV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTg3MzMsImV4cCI6MjA4ODc5NDczM30.GhrRdA0q4jFKDCJaw4CNFsz3tag4mZiVqvhx2NsaL9U';
        const { createClient } = supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ========== SHARED UTILITIES ==========
        function formatPrice(amount) { return '₹' + amount; }
        function showToast(message, type = 'success') {
            const existing = document.getElementById('bvr-toast');
            if (existing) existing.remove();
            const colors = { success: '#d4a017', error: '#ef4444', info: '#3b82f6' };
            const toast = document.createElement('div');
            toast.id = 'bvr-toast';
            toast.textContent = message;
            Object.assign(toast.style, {
                position: 'fixed', bottom: '80px', left: '50%', transform: 'translateX(-50%)',
                background: colors[type] || colors.success, color: type === 'success' ? '#1a0e00' : '#fff',
                padding: '10px 24px', borderRadius: '9999px', fontFamily: "'Poppins',sans-serif",
                fontSize: '.85rem', fontWeight: '600', zIndex: '999', whiteSpace: 'nowrap',
                boxShadow: '0 4px 20px rgba(0,0,0,0.4)', transition: 'opacity 0.3s ease', opacity: '1'
            });
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }
        function safeGetJSON(key, fallback) {
            try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
            catch (e) { return fallback; }
        }
        function safeSetJSON(key, value) {
            try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) { console.error(e); }
        }

        // ========== MENU DATA (from Supabase) ==========
        let menuItems = []; // populated from DB

        function showSkeletonCards(count) {
            const grid = document.getElementById('menuGrid');
            grid.innerHTML = Array.from({ length: count }, () => `
                <div class="menu-card" style="min-height:140px;">
                    <div>
                        <div class="skeleton-box" style="height:18px;width:80%;margin-bottom:8px;"></div>
                        <div class="skeleton-box" style="height:12px;width:100%;margin-bottom:4px;"></div>
                        <div class="skeleton-box" style="height:12px;width:60%;margin-bottom:12px;"></div>
                    </div>
                    <div style="display:flex;align-items:center;justify-content:space-between;">
                        <div class="skeleton-box" style="height:20px;width:50px;"></div>
                        <div class="skeleton-box" style="height:36px;width:36px;border-radius:50%;"></div>
                    </div>
                </div>
            `).join('');
        }

        async function loadMenu() {
            showSkeletonCards(6);

            try {
                const { data: categories, error: catErr } = await db
                    .from('menu_categories')
                    .select('*')
                    .order('sort_order');

                const { data: items, error: itemErr } = await db
                    .from('menu_items')
                    .select('*, menu_categories(name)')
                    .eq('is_available', true);

                if (catErr || itemErr) {
                    console.error('[BVR] Menu fetch error:', catErr || itemErr);
                    showToast('Menu unavailable. Please try again.', 'error');
                    document.getElementById('menuGrid').innerHTML = `
                        <div style="grid-column:1/-1;text-align:center;padding:40px 20px;color:var(--muted);">
                            <div style="font-size:2rem;margin-bottom:8px;">⚠️</div>
                            <p>Could not load menu. <a href="#" onclick="loadMenu();return false;" style="color:#f5c842;">Retry</a></p>
                        </div>`;
                    return;
                }

                // Map items to internal format
                menuItems = items.map(item => ({
                    id: item.id,
                    name: item.name,
                    desc: item.description,
                    price: item.price,
                    cat: item.menu_categories ? item.menu_categories.name : 'Other'
                }));

                // Render category tabs
                renderCategoryTabs(categories.map(c => c.name));
                renderMenu('all');
                updateCartUI();
                console.log('[BVR] Menu loaded from Supabase:', menuItems.length, 'items');

            } catch (err) {
                console.error('[BVR] Network error:', err);
                showToast('No internet. Retrying in 5s...', 'error');
                setTimeout(loadMenu, 5000);
            }
        }

        function renderCategoryTabs(categoryNames) {
            const tabsWrap = document.getElementById('tabsWrap');
            tabsWrap.innerHTML = '<button class="tab-btn active" data-cat="all">All</button>' +
                categoryNames.map(name => `<button class="tab-btn" data-cat="${name}">${name}</button>`).join('');

            // Rebind tab click events
            tabsWrap.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    tabsWrap.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderMenu(btn.dataset.cat);
                });
            });
        }

        // ========== CART ==========
        let cart = safeGetJSON('bvr_cart', []);

        function saveCart() {
            safeSetJSON('bvr_cart', cart);
            updateCartUI();
        }

        function getCartItem(id) { return cart.find(c => c.id === id); }

        function addToCart(id) {
            const existing = getCartItem(id);
            if (existing) {
                existing.quantity++;
            } else {
                const item = menuItems.find(m => m.id === id);
                if (!item) return;
                cart.push({ id: item.id, name: item.name, price: item.price, quantity: 1, category: item.cat });
            }
            saveCart();
            renderMenu(currentCat);
            const item = menuItems.find(m => m.id === id);
            if (item) showToast(`${item.name} added to cart`);
        }

        function removeFromCart(id) {
            const existing = getCartItem(id);
            if (existing) {
                existing.quantity--;
                if (existing.quantity <= 0) cart = cart.filter(c => c.id !== id);
            }
            saveCart();
            renderMenu(currentCat);
        }

        function updateCartUI() {
            const totalItems = cart.reduce((s, c) => s + c.quantity, 0);
            const totalPrice = cart.reduce((s, c) => s + c.quantity * c.price, 0);
            const badge = document.getElementById('cartBadge');
            const floatCart = document.getElementById('floatCart');
            const floatText = document.getElementById('floatCartText');

            if (totalItems > 0) {
                badge.style.display = 'flex';
                badge.textContent = totalItems;
                floatCart.style.display = 'block';
                floatText.textContent = `View Cart (${totalItems} item${totalItems > 1 ? 's' : ''}) → ${formatPrice(totalPrice)}`;
            } else {
                badge.style.display = 'none';
                floatCart.style.display = 'none';
            }
        }

        // ========== RENDER ==========
        let currentCat = 'all';

        function renderMenu(cat) {
            currentCat = cat;
            const grid = document.getElementById('menuGrid');
            const items = cat === 'all' ? menuItems : menuItems.filter(m => m.cat === cat);

            if (items.length === 0) {
                grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted);">
                    <p>No items in this category</p></div>`;
                return;
            }

            grid.style.opacity = '0';
            setTimeout(() => {
                grid.innerHTML = items.map(item => {
                    const inCart = getCartItem(item.id);
                    return `
              <div class="menu-card" data-id="${item.id}" data-name="${item.name}" data-price="${item.price}" data-category="${item.cat}">
                <div>
                  <h3 style="font-size:0.95rem;color:#f5c842;margin-bottom:4px;font-family:'Playfair Display',serif;">${item.name}</h3>
                  <p style="font-size:0.75rem;color:#a07840;margin-bottom:10px;line-height:1.3;">${item.desc}</p>
                </div>
                <div style="display:flex;align-items:center;justify-content:space-between;">
                  <span style="color:#f5c842;font-weight:700;font-size:1.05rem;">${formatPrice(item.price)}</span>
                  ${inCart ? `
                    <div class="qty-wrap">
                      <button class="qty-btn" onclick="removeFromCart('${item.id}')">−</button>
                      <span class="qty-num">${inCart.quantity}</span>
                      <button class="qty-btn" onclick="addToCart('${item.id}')">+</button>
                    </div>
                  ` : `
                    <button class="add-btn" onclick="addToCart('${item.id}')" aria-label="Add ${item.name}">+</button>
                  `}
                </div>
              </div>
            `;
                }).join('');
                grid.style.transition = 'opacity 0.2s ease';
                grid.style.opacity = '1';
            }, 50);
        }

        // ========== INIT ==========
        document.addEventListener('DOMContentLoaded', () => {
            loadMenu();
        });
        console.log('[BVR] Menu page initializing...');
    </script>
</body>

</html>
