<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BVR Menu — Order Food Online</title>
    <meta name="description"
        content="Browse the BVR Bangaru Vakili menu. Biryani, starters, curries & more. Order online for dine-in or delivery." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap');

        :root {
            --bg: #0a0500;
            --card-bg: #1a0e00;
            --border: #d4a01740;
            --gold: #d4a017;
            --bright-gold: #f5c842;
            --text: #f5e6c8;
            --muted: #a07840;
            --green: #22c55e;
            --red: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
        }

        /* ========== NAVBAR ========== */
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            background: #0a050098;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
        }

        /* ========== CATEGORY TABS ========== */
        .tabs-wrap {
            position: sticky;
            top: 64px;
            z-index: 90;
            background: #0a0500f0;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            overflow-x: auto;
            display: flex;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
        .tabs-wrap::-webkit-scrollbar { display: none; }

        .tab-btn {
            flex-shrink: 0;
            padding: 0 16px;
            height: 36px;
            border-radius: 9999px;
            border: 1px solid #d4a01740;
            background: transparent;
            color: var(--muted);
            font-size: .8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s ease;
            font-family: 'Poppins', sans-serif;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .tab-btn.active {
            background: var(--gold);
            color: #0a0500;
            border-color: transparent;
            font-weight: 700;
            box-shadow: 0 0 14px #d4a01755;
        }
        .tab-btn:not(.active):hover {
            border-color: var(--gold);
            color: var(--bright-gold);
        }

        /* ========== SEARCH BAR ========== */
        .search-wrap {
            padding: 12px 16px 4px;
            max-width: 960px;
            margin: 0 auto;
        }
        .search-inner {
            position: relative;
            display: flex;
            align-items: center;
        }
        .search-icon {
            position: absolute;
            left: 14px;
            font-size: 1rem;
            z-index: 1;
            pointer-events: none;
        }
        .search-input {
            width: 100%;
            height: 44px;
            padding: 0 40px 0 40px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            font-size: .9rem;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        .search-input::placeholder { color: #a0784060; }
        .search-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px #d4a01720;
        }
        .search-clear {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            color: var(--muted);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 4px;
            display: none;
            line-height: 1;
        }
        .search-clear.visible { display: block; }

        /* ========== SECTION HEADER ========== */
        .section-header {
            padding: 24px 16px 0;
            max-width: 960px;
            margin: 0 auto;
        }
        .section-header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 3px solid var(--gold);
            padding-left: 12px;
            margin-bottom: 12px;
        }
        .section-header-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: var(--bright-gold);
            font-weight: 700;
        }
        .section-header-count {
            font-size: .78rem;
            color: var(--muted);
            font-weight: 500;
            background: #d4a01718;
            padding: 2px 10px;
            border-radius: 999px;
        }

        /* ========== MENU GRID ========== */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 8px 16px 120px;
            max-width: 960px;
            margin: 0 auto;
        }
        @media (min-width: 768px) {
            .menu-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; }
        }
        @media (min-width: 1024px) {
            .menu-grid { grid-template-columns: repeat(4, 1fr); }
        }

        /* ========== MENU CARD ========== */
        .menu-card {
            background: var(--card-bg);
            border: 1px solid #d4a01740;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: transform .2s ease, box-shadow .2s ease;
            display: flex;
            flex-direction: column;
        }
        .menu-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px #d4a01740;
        }

        /* Image area */
        .card-img-wrap {
            position: relative;
            height: 160px;
            flex-shrink: 0;
        }
        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 0;
            display: block;
        }
        .card-img-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #d4a017, #f5c842);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        .card-cat-badge {
            position: absolute;
            top: 8px; left: 8px;
            background: #0a050092;
            backdrop-filter: blur(6px);
            color: #f5c842;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            padding: 3px 8px;
            border-radius: 999px;
        }

        /* Card body */
        .card-body {
            padding: 10px 12px 12px;
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 6px;
        }
        .card-name {
            font-family: 'Playfair Display', serif;
            font-size: .98rem;
            font-weight: 700;
            color: var(--text);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }
        .card-price {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--bright-gold);
            font-family: 'Poppins', sans-serif;
        }

        /* Add button */
        .add-btn {
            width: 100%;
            height: 40px;
            background: linear-gradient(135deg, #d4a017, #f5c842);
            color: #0a0500;
            font-weight: 700;
            font-size: .9rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all .2s;
            font-family: 'Poppins', sans-serif;
            margin-top: auto;
        }
        .add-btn:hover {
            box-shadow: 0 4px 16px #d4a01760;
            transform: translateY(-1px);
        }
        .add-btn:active { transform: scale(.97); }

        /* Qty counter */
        .qty-row {
            display: flex;
            align-items: center;
            background: #d4a01718;
            border: 1px solid var(--gold);
            border-radius: 8px;
            overflow: hidden;
            height: 40px;
            margin-top: auto;
        }
        .qty-btn {
            width: 36px;
            height: 100%;
            background: transparent;
            border: none;
            color: var(--bright-gold);
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            transition: background .15s;
            flex-shrink: 0;
        }
        .qty-btn:hover { background: #d4a01725; }
        .qty-btn:active { background: #d4a01740; }
        .qty-num {
            flex: 1;
            text-align: center;
            font-weight: 700;
            color: var(--bright-gold);
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            pointer-events: none;
        }

        /* ========== SKELETON ========== */
        .skeleton-card {
            background: #1a0e00;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #d4a01720;
        }
        .skeleton-img {
            height: 160px;
            background: linear-gradient(90deg, #1a0e00 25%, #2a1800 50%, #1a0e00 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        .skeleton-line {
            height: 12px;
            border-radius: 6px;
            margin: 8px 12px;
            background: linear-gradient(90deg, #1a0e00 25%, #2a1800 50%, #1a0e00 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0%   { background-position: -200% 0; }
            100% { background-position:  200% 0; }
        }

        /* ========== FLOATING CART ========== */
        .float-cart {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(90px);
            z-index: 95;
            opacity: 0;
            transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .3s ease;
            pointer-events: none;
        }
        .float-cart.visible {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: all;
        }
        @keyframes cartBounce {
            0%   { transform: translateX(-50%) translateY(0) scale(1); }
            30%  { transform: translateX(-50%) translateY(-8px) scale(1.04); }
            60%  { transform: translateX(-50%) translateY(0) scale(.98); }
            80%  { transform: translateX(-50%) translateY(-3px) scale(1.01); }
            100% { transform: translateX(-50%) translateY(0) scale(1); }
        }
        .float-cart.bounce {
            animation: cartBounce .45s ease;
        }
        .float-cart-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #d4a017, #f5c842);
            color: #0a0500;
            text-decoration: none;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: .95rem;
            height: 56px;
            padding: 0 28px;
            border-radius: 999px;
            box-shadow: 0 8px 32px #d4a01760;
            white-space: nowrap;
        }
        .float-cart-divider {
            width: 1px;
            height: 20px;
            background: #0a050040;
        }

        /* ========== EMPTY STATE ========== */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }
        .empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; }
        .empty-state h3 { font-size: 1.1rem; color: var(--gold); margin-bottom: 6px; }
        .empty-state p { font-size: .85rem; }

        /* Toast */
        #bvr-toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            white-space: nowrap;
        }
    </style>
</head>

<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <div style="max-width:1200px;margin:auto;display:flex;align-items:center;justify-content:space-between;">
            <a href="index.html"
                style="color:#d4a017;text-decoration:none;font-size:1.3rem;display:flex;align-items:center;gap:6px;">
                ← <span style="font-size:0.85rem;color:#f5e6c8;font-family:'Poppins',sans-serif;">Back</span>
            </a>
            <h1 style="font-size:1.1rem;color:#d4a017;font-family:'Playfair Display',serif;">BVR Menu</h1>
            <div style="position:relative;">
                <a href="cart.html" style="color:#d4a017;text-decoration:none;font-size:1.5rem;" id="cartIcon"
                    aria-label="Go to cart">🛒</a>
                <span id="cartBadge"
                    style="position:absolute;top:-6px;right:-10px;background:#ef4444;color:#fff;font-size:0.6rem;font-weight:700;width:18px;height:18px;border-radius:50%;display:none;align-items:center;justify-content:center;">0</span>
            </div>
        </div>
    </nav>

    <!-- ===== CATEGORY TABS ===== -->
    <div class="tabs-wrap" id="tabsWrap" style="margin-top:64px;">
        <button class="tab-btn active" data-cat="all">All</button>
    </div>

    <!-- ===== SEARCH BAR ===== -->
    <div class="search-wrap">
        <div class="search-inner">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchInput" placeholder="Search dishes..." autocomplete="off" />
            <button class="search-clear" id="searchClear" onclick="clearSearch()" aria-label="Clear search">×</button>
        </div>
    </div>

    <!-- ===== MENU CONTAINER ===== -->
    <div id="menuContainer">
        <!-- Populated by JS: section headers + menu-grid per category, or single grid for filtered -->
    </div>

    <!-- ===== FLOATING CART ===== -->
    <div class="float-cart" id="floatCart">
        <a href="cart.html" class="float-cart-btn" id="floatCartBtn">
            <span>🛒</span>
            <span>View Cart</span>
            <div class="float-cart-divider"></div>
            <span id="floatCartText">0 items · ₹0</span>
        </a>
    </div>

    <script>
    // ========== SUPABASE ==========
    const SUPABASE_URL = 'https://feglxiibeuzsahoevzuu.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZlZ2x4aWliZXV6c2Fob2V2enV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTg3MzMsImV4cCI6MjA4ODc5NDczM30.GhrRdA0q4jFKDCJaw4CNFsz3tag4mZiVqvhx2NsaL9U';
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ========== UTILITIES ==========
    function formatPrice(n) { return '₹' + n; }

    function showToast(msg, type = 'success') {
        const el = document.getElementById('bvr-toast');
        if (el) el.remove();
        const colors = { success: '#d4a017', error: '#ef4444', info: '#3b82f6' };
        const t = document.createElement('div');
        t.id = 'bvr-toast';
        t.textContent = msg;
        Object.assign(t.style, {
            background: colors[type] || colors.success,
            color: type === 'success' ? '#1a0e00' : '#fff',
            padding: '10px 24px', borderRadius: '9999px',
            fontFamily: "'Poppins',sans-serif", fontSize: '.85rem',
            fontWeight: '600', boxShadow: '0 4px 20px rgba(0,0,0,.4)',
            opacity: '1', transition: 'opacity .3s'
        });
        document.body.appendChild(t);
        setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2800);
    }

    function safeGetJSON(k, fb) {
        try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; }
        catch { return fb; }
    }
    function safeSetJSON(k, v) {
        try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) { console.error(e); }
    }

    // ========== CATEGORY EMOJI MAP ==========
    const CAT_EMOJI = {
        'biryani':      '🍖',
        'starters':     '🍢',
        'curries':      '🍛',
        'breads':       '🫓',
        'rice & noodles': '🍜',
        'rice':         '🍚',
        'noodles':      '🍜',
        'desserts':     '🍮',
        'drinks':       '🥤',
        'soups':        '🥣',
        'soup':         '🥣',
        'sweets':       '🍮',
    };
    function getCatEmoji(catName) {
        if (!catName) return '🍽️';
        return CAT_EMOJI[catName.toLowerCase()] || '🍽️';
    }

    // ========== SKELETON ==========
    function showSkeletons(count = 6) {
        const container = document.getElementById('menuContainer');
        container.innerHTML = `<div class="menu-grid" style="padding-top:16px;">` +
            Array.from({ length: count }, () => `
                <div class="skeleton-card">
                    <div class="skeleton-img"></div>
                    <div style="padding:8px 0 12px;">
                        <div class="skeleton-line" style="width:80%;"></div>
                        <div class="skeleton-line" style="width:55%;"></div>
                        <div class="skeleton-line" style="width:65%;height:32px;margin-top:10px;border-radius:8px;"></div>
                    </div>
                </div>`).join('') +
        `</div>`;
    }

    // ========== DATA ==========
    let menuItems = [];
    let allCategories = [];
    let currentCat = 'all';
    let searchQuery = '';

    async function loadMenu() {
        showSkeletons(6);
        try {
            const [{ data: cats, error: catErr }, { data: items, error: itemErr }] = await Promise.all([
                db.from('menu_categories').select('*').order('sort_order'),
                db.from('menu_items').select('*, menu_categories(name)').eq('is_available', true)
            ]);

            if (catErr || itemErr) {
                showError(catErr || itemErr);
                return;
            }

            allCategories = cats || [];
            menuItems = (items || []).map(item => ({
                id:        item.id,
                name:      item.name,
                desc:      item.description || '',
                price:     item.price,
                imageUrl:  item.image_url || null,
                cat:       item.menu_categories ? item.menu_categories.name : 'Other'
            }));

            renderTabs();
            renderMenu();
            updateCartUI();
            console.log('[BVR] Menu loaded:', menuItems.length, 'items');

        } catch (err) {
            console.error('[BVR] Network error:', err);
            showToast('No internet. Retrying in 5s...', 'error');
            setTimeout(loadMenu, 5000);
        }
    }

    function showError(err) {
        document.getElementById('menuContainer').innerHTML = `
            <div style="text-align:center;padding:60px 20px;color:var(--muted);">
                <div style="font-size:2.5rem;margin-bottom:12px;">⚠️</div>
                <p style="margin-bottom:16px;">Menu unavailable. Please try again.</p>
                <button onclick="loadMenu()" style="background:var(--gold);color:#0a0500;border:none;padding:10px 24px;border-radius:999px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;">
                    🔄 Retry
                </button>
            </div>`;
        showToast('Menu unavailable. Please try again.', 'error');
        console.error('[BVR] Error:', err);
    }

    // ========== TABS ==========
    function renderTabs() {
        const wrap = document.getElementById('tabsWrap');
        const countAll = menuItems.length;

        let html = `<button class="tab-btn ${currentCat === 'all' ? 'active' : ''}" data-cat="all" onclick="setTab('all')">All (${countAll})</button>`;

        allCategories.forEach(cat => {
            const count = menuItems.filter(m => m.cat === cat.name).length;
            if (count === 0) return;
            const active = currentCat === cat.name ? 'active' : '';
            html += `<button class="tab-btn ${active}" data-cat="${cat.name}" onclick="setTab('${cat.name}')">${getCatEmoji(cat.name)} ${cat.name} (${count})</button>`;
        });

        wrap.innerHTML = html;
    }

    function setTab(cat) {
        currentCat = cat;
        searchQuery = '';
        document.getElementById('searchInput').value = '';
        document.getElementById('searchClear').classList.remove('visible');
        renderTabs();
        renderMenu();
        // Scroll selected tab into view
        const activeBtn = document.querySelector('.tab-btn.active');
        if (activeBtn) activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }

    // ========== SEARCH ==========
    document.getElementById('searchInput').addEventListener('input', function() {
        searchQuery = this.value.trim();
        const clearBtn = document.getElementById('searchClear');
        clearBtn.classList.toggle('visible', searchQuery.length > 0);
        renderMenu();
    });

    function clearSearch() {
        searchQuery = '';
        document.getElementById('searchInput').value = '';
        document.getElementById('searchClear').classList.remove('visible');
        document.getElementById('searchInput').focus();
        renderMenu();
    }

    // ========== RENDER ==========
    function getFilteredItems() {
        let items = currentCat === 'all' ? menuItems : menuItems.filter(m => m.cat === currentCat);
        if (searchQuery) {
            const q = searchQuery.toLowerCase();
            items = items.filter(m => m.name.toLowerCase().includes(q));
        }
        return items;
    }

    function renderMenu() {
        const container = document.getElementById('menuContainer');
        const filtered = getFilteredItems();

        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="menu-grid" style="padding-top:16px;">
                    <div class="empty-state">
                        <div class="empty-icon">🔍</div>
                        <h3>No results found</h3>
                        <p>No dishes match "${searchQuery || currentCat}"</p>
                    </div>
                </div>`;
            return;
        }

        // If "All" tab and no search → group by category with section headers
        if (currentCat === 'all' && !searchQuery) {
            let html = '';
            allCategories.forEach(cat => {
                const catItems = menuItems.filter(m => m.cat === cat.name);
                if (catItems.length === 0) return;

                html += `
                    <div class="section-header">
                        <div class="section-header-inner">
                            <span class="section-header-title">${getCatEmoji(cat.name)} ${cat.name}</span>
                            <span class="section-header-count">${catItems.length} items</span>
                        </div>
                    </div>
                    <div class="menu-grid" style="padding-top:0;">
                        ${catItems.map(item => renderCard(item)).join('')}
                    </div>`;
            });
            container.innerHTML = html;
        } else {
            // Single filtered/searched grid
            container.innerHTML = `
                <div class="menu-grid" style="padding-top:16px;">
                    ${filtered.map(item => renderCard(item)).join('')}
                </div>`;
        }
    }

    function renderCard(item) {
        const inCart = getCartItem(item.id);
        const qty = inCart ? inCart.quantity : 0;

        // Image or placeholder
        const imgHtml = item.imageUrl
            ? `<img class="card-img" src="${item.imageUrl}" alt="${item.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
               <div class="card-img-placeholder" style="display:none;">${getCatEmoji(item.cat)}</div>`
            : `<div class="card-img-placeholder">${getCatEmoji(item.cat)}</div>`;

        // Add / qty control
        const actionHtml = qty === 0
            ? `<button class="add-btn" onclick="addToCart('${item.id}')">+ Add</button>`
            : `<div class="qty-row">
                 <button class="qty-btn" onclick="removeFromCart('${item.id}')">−</button>
                 <span class="qty-num">${qty}</span>
                 <button class="qty-btn" onclick="addToCart('${item.id}')">+</button>
               </div>`;

        return `
            <div class="menu-card" data-id="${item.id}" data-name="${item.name}" data-price="${item.price}" data-category="${item.cat}">
                <div class="card-img-wrap">
                    ${imgHtml}
                    <span class="card-cat-badge">${item.cat}</span>
                </div>
                <div class="card-body">
                    <div class="card-name">${item.name}</div>
                    <div class="card-price">${formatPrice(item.price)}</div>
                    ${actionHtml}
                </div>
            </div>`;
    }

    // ========== CART ==========
    let cart = safeGetJSON('bvr_cart', []);

    function getCartItem(id) { return cart.find(c => c.id === id); }

    function addToCart(id) {
        const ex = getCartItem(id);
        if (ex) {
            ex.quantity++;
        } else {
            const item = menuItems.find(m => m.id === id);
            if (!item) return;
            cart.push({ id: item.id, name: item.name, price: item.price, quantity: 1, category: item.cat });
            showToast(`${item.name} added ✓`);
        }
        safeSetJSON('bvr_cart', cart);
        // Re-render only the affected card
        const cardEl = document.querySelector(`.menu-card[data-id="${id}"]`);
        if (cardEl) {
            const item = menuItems.find(m => m.id === id);
            if (item) {
                const inCart = getCartItem(id);
                const qty = inCart ? inCart.quantity : 0;
                const body = cardEl.querySelector('.card-body');
                const actionWrap = body.querySelector('.add-btn, .qty-row');
                if (actionWrap) actionWrap.outerHTML = qty === 0
                    ? `<button class="add-btn" onclick="addToCart('${id}')">+ Add</button>`
                    : `<div class="qty-row">
                         <button class="qty-btn" onclick="removeFromCart('${id}')">−</button>
                         <span class="qty-num">${qty}</span>
                         <button class="qty-btn" onclick="addToCart('${id}')">+</button>
                       </div>`;
            }
        }
        updateCartUI();
    }

    function removeFromCart(id) {
        const ex = getCartItem(id);
        if (!ex) return;
        ex.quantity--;
        if (ex.quantity <= 0) cart = cart.filter(c => c.id !== id);
        safeSetJSON('bvr_cart', cart);
        // Re-render only the affected card
        const cardEl = document.querySelector(`.menu-card[data-id="${id}"]`);
        if (cardEl) {
            const qty = (getCartItem(id) || {}).quantity || 0;
            const body = cardEl.querySelector('.card-body');
            const actionWrap = body.querySelector('.add-btn, .qty-row');
            if (actionWrap) actionWrap.outerHTML = qty === 0
                ? `<button class="add-btn" onclick="addToCart('${id}')">+ Add</button>`
                : `<div class="qty-row">
                     <button class="qty-btn" onclick="removeFromCart('${id}')">−</button>
                     <span class="qty-num">${qty}</span>
                     <button class="qty-btn" onclick="addToCart('${id}')">+</button>
                   </div>`;
        }
        updateCartUI();
    }

    let prevCartCount = 0;

    function updateCartUI() {
        const total = cart.reduce((s, c) => s + c.quantity, 0);
        const price = cart.reduce((s, c) => s + c.quantity * c.price, 0);
        const badge   = document.getElementById('cartBadge');
        const floatCart = document.getElementById('floatCart');
        const floatText = document.getElementById('floatCartText');

        // Navbar badge
        if (total > 0) {
            badge.style.display = 'flex';
            badge.textContent = total;
        } else {
            badge.style.display = 'none';
        }

        // Floating button
        floatText.textContent = `${total} item${total !== 1 ? 's' : ''} · ${formatPrice(price)}`;
        if (total > 0) {
            floatCart.classList.add('visible');
            // Bounce when count changes
            if (total !== prevCartCount) {
                floatCart.classList.remove('bounce');
                void floatCart.offsetWidth; // reflow
                floatCart.classList.add('bounce');
                setTimeout(() => floatCart.classList.remove('bounce'), 450);
            }
        } else {
            floatCart.classList.remove('visible');
        }
        prevCartCount = total;
    }

    // ========== INIT ==========
    document.addEventListener('DOMContentLoaded', () => {
        cart = safeGetJSON('bvr_cart', []);
        updateCartUI();
        loadMenu();
    });
    </script>
</body>
</html>
