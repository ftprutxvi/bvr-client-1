<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BVR Owner Dashboard</title>
    <meta name="description" content="Owner dashboard for BVR Bangaru Vakili Restaurant. Manage orders." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap');

        :root {
            --bg: #0a0500;
            --card-bg: #1a0e00;
            --border: #d4a01740;
            --gold: #d4a017;
            --bright-gold: #f5c842;
            --text: #f5e6c8;
            --muted: #a07840;
            --green: #22c55e;
            --red: #ef4444
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden
        }

        h1,
        h2,
        h3 {
            font-family: 'Playfair Display', serif
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: #0a050095;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 16px;
            margin-bottom: 12px
        }

        .btn-gold {
            background: linear-gradient(135deg, #d4a017, #f5c842);
            color: #1a0e00;
            font-weight: 700;
            border-radius: 9999px;
            min-height: 48px;
            padding: 12px 24px;
            border: none;
            cursor: pointer;
            transition: all .2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            text-decoration: none;
            width: 100%
        }

        .btn-gold:hover {
            box-shadow: 0 0 25px #d4a01780;
            transform: translateY(-2px)
        }

        .input-field {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #0f0700;
            color: var(--text);
            font-size: .95rem;
            font-family: 'Poppins', sans-serif;
            min-height: 48px;
            outline: none;
            transition: border-color .2s
        }

        .input-field:focus {
            border-color: var(--gold)
        }

        .input-field::placeholder {
            color: #a0784080
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 16px
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            text-align: center
        }

        .stat-num {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--bright-gold);
            font-family: 'Playfair Display', serif
        }

        .stat-label {
            font-size: .7rem;
            color: var(--muted)
        }

        /* Filter tabs */
        .filter-wrap {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 8px 0;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 12px
        }

        .filter-wrap::-webkit-scrollbar {
            display: none
        }

        .filter-btn {
            flex-shrink: 0;
            padding: 6px 14px;
            border-radius: 9999px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-size: .8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s;
            font-family: 'Poppins', sans-serif;
            white-space: nowrap
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #d4a017, #f5c842);
            color: #1a0e00;
            border-color: transparent
        }

        /* Action buttons */
        .act-btn {
            padding: 8px 14px;
            border-radius: 9999px;
            border: none;
            font-size: .78rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            min-height: 36px;
            font-family: 'Poppins', sans-serif
        }

        .act-confirm {
            background: #22c55e30;
            color: #22c55e
        }

        .act-cook {
            background: #f9731620;
            color: #f97316
        }

        .act-danger {
            background: #ef444420;
            color: #ef4444
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 9999px;
            font-size: .7rem;
            font-weight: 600;
            white-space: nowrap
        }

        /* Login overlay */
        .login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .9);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px
        }

        .login-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 32px;
            max-width: 360px;
            width: 100%
        }

        .login-box h2 {
            color: var(--gold);
            text-align: center;
            margin-bottom: 20px
        }

        .logout-link {
            color: var(--muted);
            text-decoration: none;
            font-size: .9rem
        }

        /* Skeleton loading */
        .skeleton-box {
            background: linear-gradient(90deg, #1a0e00 25%, #2a1800 50%, #1a0e00 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        /* Pulse gold animation for new order alert */
        @keyframes pulseGold {
            0% {
                box-shadow: 0 0 0 0 rgba(212, 160, 23, 0.7);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(212, 160, 23, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(212, 160, 23, 0);
            }
        }

        .pulse-gold {
            animation: pulseGold 1s ease-out;
        }

        /* Owner tabs */
        .owner-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 16px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: var(--card-bg);
        }
        .owner-tab {
            flex: 1;
            padding: 12px 16px;
            text-align: center;
            cursor: pointer;
            font-size: .88rem;
            font-weight: 600;
            background: transparent;
            color: var(--muted);
            border: none;
            transition: all .2s;
            font-family: 'Poppins', sans-serif;
        }
        .owner-tab.active {
            background: linear-gradient(135deg, #d4a017, #f5c842);
            color: #0a0500;
        }

        /* Toggle switch */
        .toggle-switch {
            position: relative;
            width: 48px;
            height: 26px;
            flex-shrink: 0;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .toggle-slider {
            position: absolute;
            inset: 0;
            background: #3a2010;
            border-radius: 13px;
            cursor: pointer;
            transition: all .3s;
        }
        .toggle-slider:before {
            content: '';
            position: absolute;
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background: #888;
            border-radius: 50%;
            transition: all .3s;
        }
        .toggle-switch input:checked + .toggle-slider {
            background: #22c55e30;
        }
        .toggle-switch input:checked + .toggle-slider:before {
            transform: translateX(22px);
            background: #22c55e;
        }

        /* Menu item row */
        .menu-item-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #d4a01715;
        }
        .menu-item-row:last-child {
            border-bottom: none;
        }
        .menu-item-thumb {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
            background: linear-gradient(135deg, #d4a017, #f5c842);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        .menu-item-thumb img {
            width: 100%;
            height: 100%;
            border-radius: 10px;
            object-fit: cover;
        }
        .availability-bar {
            display: flex;
            gap: 16px;
            padding: 10px 14px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 12px;
            font-size: .85rem;
            justify-content: center;
        }
        .availability-bar .avail-count {
            font-weight: 700;
        }

        /* Menu cat filter */
        .menu-cat-wrap {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 0 0 10px;
            -webkit-overflow-scrolling: touch;
        }
        .menu-cat-wrap::-webkit-scrollbar { display: none; }

        /* Reject modal */
        .reject-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .75);
            z-index: 300;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .reject-overlay.open {
            display: flex;
        }
        .reject-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 28px;
            max-width: 360px;
            width: 100%;
        }
        .reject-box h3 {
            color: var(--red);
            font-size: 1.05rem;
            margin-bottom: 16px;
        }
        .reason-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all .2s;
            font-size: .88rem;
            background: transparent;
            color: var(--text);
        }
        .reason-option:hover {
            border-color: var(--gold);
            background: #d4a01708;
        }
        .reason-option.selected {
            border-color: var(--red);
            background: #ef444415;
        }
        .reason-option input[type="radio"] {
            accent-color: var(--red);
            width: 16px;
            height: 16px;
        }
        .reject-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }
        .reject-actions button {
            flex: 1;
            padding: 12px 16px;
            border-radius: 12px;
            border: none;
            font-size: .88rem;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            min-height: 44px;
            transition: all .2s;
        }
        .reject-cancel-btn {
            background: #d4a01720;
            color: var(--gold);
        }
        .reject-confirm-btn {
            background: var(--red);
            color: #fff;
        }
        .reject-confirm-btn:disabled {
            opacity: .4;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

    <!-- LOGIN OVERLAY -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>🔐 Owner Login</h2>
            <div style="display:flex;flex-direction:column;gap:12px;">
                <input type="email" class="input-field" id="loginEmail" placeholder="Email" autocomplete="email" />
                <input type="password" class="input-field" id="loginPassword" placeholder="Password"
                    autocomplete="current-password" />
                <button class="btn-gold" onclick="handleLogin()">🔓 Login</button>
                <p id="loginErr" style="color:var(--red);font-size:.8rem;text-align:center;display:none;"></p>
            </div>
        </div>
    </div>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div style="max-width:1200px;margin:auto;display:flex;align-items:center;justify-content:space-between;">
            <h1 style="font-size:1.15rem;color:#d4a017;">👑 Owner Dashboard</h1>
            <a href="#" onclick="handleLogout()" class="logout-link">Logout ↗</a>
        </div>
    </nav>

    <main style="padding:80px 16px 32px;max-width:800px;margin:auto;">

        <!-- OWNER TABS -->
        <div class="owner-tabs">
            <button class="owner-tab active" id="tabOrders" onclick="switchOwnerTab('orders')">📋 Orders</button>
            <button class="owner-tab" id="tabMenu" onclick="switchOwnerTab('menu')">🍽️ Menu</button>
        </div>

        <!-- ========== ORDERS TAB ========== -->
        <div id="ordersTab">

        <!-- STATS -->
        <div class="stats-grid">
            <div class="stat-card" id="statPending">
                <div class="stat-num" id="countPending">0</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="countActive">0</div>
                <div class="stat-label">Active</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="countToday">0</div>
                <div class="stat-label">Today</div>
            </div>
        </div>

        <!-- REVENUE -->
        <div class="card" style="text-align:center;">
            <div style="font-size:.8rem;color:var(--muted);">Today's Revenue</div>
            <div style="font-size:1.8rem;font-weight:700;color:var(--bright-gold);font-family:'Playfair Display',serif;"
                id="revenueTotal">₹0</div>
        </div>

        <!-- FILTER -->
        <div class="filter-wrap" id="filterWrap">
            <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
            <button class="filter-btn" data-filter="new" onclick="setFilter('new')">🆕 New</button>
            <button class="filter-btn" data-filter="active" onclick="setFilter('active')">🔥 Active</button>
            <button class="filter-btn" data-filter="ready" onclick="setFilter('ready')">✅ Ready</button>
            <button class="filter-btn" data-filter="completed" onclick="setFilter('completed')">🏁 Done</button>
        </div>

        <!-- ORDERS LIST -->
        <div id="ordersContainer">
            <!-- Skeleton cards -->
            <div class="card">
                <div class="skeleton-box" style="height:20px;width:40%;margin-bottom:10px;"></div>
                <div class="skeleton-box" style="height:14px;width:70%;margin-bottom:6px;"></div>
                <div class="skeleton-box" style="height:14px;width:50%;"></div>
            </div>
            <div class="card">
                <div class="skeleton-box" style="height:20px;width:40%;margin-bottom:10px;"></div>
                <div class="skeleton-box" style="height:14px;width:70%;margin-bottom:6px;"></div>
                <div class="skeleton-box" style="height:14px;width:50%;"></div>
            </div>
            <div class="card">
                <div class="skeleton-box" style="height:20px;width:40%;margin-bottom:10px;"></div>
                <div class="skeleton-box" style="height:14px;width:70%;margin-bottom:6px;"></div>
                <div class="skeleton-box" style="height:14px;width:50%;"></div>
            </div>
        </div>

        <!-- AUTO REFRESH NOTE -->
        <p style="text-align:center;color:var(--muted);font-size:.75rem;margin-top:16px;">
            🔄 Auto-refreshes every 10 seconds
        </p>

        </div><!-- end ordersTab -->

        <!-- ========== MENU TAB ========== -->
        <div id="menuTab" style="display:none;">
            <div class="availability-bar" id="availabilityBar">
                <span>✅ Available: <span class="avail-count" id="availCount">0</span></span>
                <span>❌ Unavailable: <span class="avail-count" id="unavailCount">0</span></span>
            </div>
            <div class="menu-cat-wrap" id="menuCatWrap">
                <button class="filter-btn active" data-mcat="all" onclick="setMenuCatFilter('all')">All</button>
            </div>
            <div id="menuItemsList">
                <div class="card"><div class="skeleton-box" style="height:60px;width:100%;"></div></div>
            </div>
        </div><!-- end menuTab -->

    </main>

    <!-- REJECT MODAL -->
    <div class="reject-overlay" id="rejectOverlay">
        <div class="reject-box">
            <h3>❌ Reject this order?</h3>
            <p style="font-size:.82rem;color:var(--muted);margin-bottom:14px;">Select a reason:</p>
            <label class="reason-option" onclick="selectReason(this, 'Outside delivery area')">
                <input type="radio" name="rejectReason" value="Outside delivery area"> Outside delivery area
            </label>
            <label class="reason-option" onclick="selectReason(this, 'Address not clear')">
                <input type="radio" name="rejectReason" value="Address not clear"> Address not clear
            </label>
            <label class="reason-option" onclick="selectReason(this, 'Delivery not available now')">
                <input type="radio" name="rejectReason" value="Delivery not available now"> Delivery not available now
            </label>
            <label class="reason-option" onclick="selectReason(this, 'Other')">
                <input type="radio" name="rejectReason" value="Other"> Other
            </label>
            <div class="reject-actions">
                <button class="reject-cancel-btn" onclick="closeRejectModal()">Cancel</button>
                <button class="reject-confirm-btn" id="confirmRejectBtn" disabled onclick="confirmReject()">Confirm Reject</button>
            </div>
        </div>
    </div>

    <script>
        // ========== SUPABASE INIT ==========
        const SUPABASE_URL = 'https://feglxiibeuzsahoevzuu.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZlZ2x4aWliZXV6c2Fob2V2enV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTg3MzMsImV4cCI6MjA4ODc5NDczM30.GhrRdA0q4jFKDCJaw4CNFsz3tag4mZiVqvhx2NsaL9U';
        const { createClient } = supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ========== SHARED UTILITIES ==========
        function formatPrice(amount) { return '₹' + amount; }
        function formatTime(isoString) {
            try { return new Date(isoString).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }); }
            catch (e) { return '—'; }
        }
        function timeAgo(isoString) {
            try {
                const diff = Math.floor((Date.now() - new Date(isoString).getTime()) / 1000);
                if (diff < 60) return diff + 's ago';
                if (diff < 3600) return Math.floor(diff / 60) + ' mins ago';
                if (diff < 86400) return Math.floor(diff / 3600) + ' hrs ago';
                return Math.floor(diff / 86400) + ' days ago';
            } catch (e) { return '—'; }
        }
        function showToast(message, type = 'success') {
            const existing = document.getElementById('bvr-toast');
            if (existing) existing.remove();
            const colors = { success: '#d4a017', error: '#ef4444', info: '#3b82f6' };
            const toast = document.createElement('div');
            toast.id = 'bvr-toast';
            toast.textContent = message;
            Object.assign(toast.style, {
                position: 'fixed', bottom: '80px', left: '50%', transform: 'translateX(-50%)',
                background: colors[type] || colors.success, color: type === 'success' ? '#1a0e00' : '#fff',
                padding: '10px 24px', borderRadius: '9999px', fontFamily: "'Poppins',sans-serif",
                fontSize: '.85rem', fontWeight: '600', zIndex: '999', whiteSpace: 'nowrap',
                boxShadow: '0 4px 20px rgba(0,0,0,0.4)', transition: 'opacity 0.3s ease', opacity: '1'
            });
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        // ========== AUTH ==========
        let isLoggedIn = false;

        function checkAuth() {
            const session = localStorage.getItem('bvr_staff_session');
            if (session === 'owner_active') {
                isLoggedIn = true;
                document.getElementById('loginOverlay').style.display = 'none';
                loadOrders();
            }
        }

        function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errEl = document.getElementById('loginErr');
            errEl.style.display = 'none';

            if (email === 'owner@bvr.com' && password === 'bvr@owner123') {
                localStorage.setItem('bvr_staff_session', 'owner_active');
                isLoggedIn = true;
                document.getElementById('loginOverlay').style.display = 'none';
                showToast('Welcome, Owner!');
                loadOrders();
            } else {
                errEl.textContent = 'Invalid email or password';
                errEl.style.display = 'block';
            }
        }

        function handleLogout() {
            localStorage.removeItem('bvr_staff_session');
            isLoggedIn = false;
            document.getElementById('loginOverlay').style.display = 'flex';
            document.title = 'BVR Owner Dashboard';
        }

        // Login on Enter key
        document.getElementById('loginPassword').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleLogin();
        });

        // ========== ORDERS ==========
        let orders = [];
        let deliveryPeople = [];
        let currentFilter = 'all';
        let prevNewCount = 0;

        async function loadOrders() {
            try {
                const { data, error } = await db
                    .from('orders')
                    .select('*, order_items(*), delivery_people(name, phone)')
                    .order('created_at', { ascending: false });

                if (error) {
                    showToast('Failed to load orders', 'error');
                    console.error('[BVR] Orders fetch error:', error);
                    return;
                }

                orders = data || [];
                renderOrders();
                updateStats();
                checkNewOrderAlert();

                console.log('[BVR] Orders loaded from Supabase:', orders.length);

            } catch (err) {
                console.error('[BVR] Network error:', err);
                showToast('No internet. Retrying in 5s...', 'error');
                setTimeout(loadOrders, 5000);
            }
        }

        async function loadDeliveryPeople() {
            try {
                const { data } = await db
                    .from('delivery_people')
                    .select('*')
                    .eq('is_active', true);
                deliveryPeople = data || [];
            } catch (err) {
                console.error('[BVR] Delivery people fetch error:', err);
            }
        }

        function getFilteredOrders() {
            if (currentFilter === 'all') return orders;
            if (currentFilter === 'new') return orders.filter(o => o.status === 'NEW');
            if (currentFilter === 'active') return orders.filter(o => ['CONFIRMED', 'IN_KITCHEN'].includes(o.status));
            if (currentFilter === 'ready') return orders.filter(o => ['READY', 'OUT_FOR_DELIVERY'].includes(o.status));
            if (currentFilter === 'completed') return orders.filter(o => ['COMPLETED', 'SERVED', 'CANCELLED'].includes(o.status));
            return orders;
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.filter === filter);
            });
            renderOrders();
        }

        function renderOrders() {
            const container = document.getElementById('ordersContainer');
            const filtered = getFilteredOrders();

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="card" style="text-align:center;padding:40px 20px;">
                        <div style="font-size:2.5rem;margin-bottom:12px;">🍽️</div>
                        <h3 style="color:var(--gold);font-size:1.1rem;margin-bottom:8px;">No orders yet today</h3>
                        <p style="color:var(--muted);font-size:.85rem;">Waiting for first order...</p>
                    </div>`;
                return;
            }

            container.innerHTML = filtered.map(o => {
                const items = (o.order_items || []).map(i => `${i.item_name} ×${i.quantity}`).join(', ');
                const dpName = o.delivery_people ? o.delivery_people.name : null;

                // Status badge
                const statusBadge = getStatusBadge(o.status);

                // Actions
                let actions = '';
                if (o.status === 'NEW' && o.type === 'delivery') {
                    actions = `
                        <div style="display:flex;gap:6px;flex-wrap:wrap;">
                            <button class="act-btn act-confirm" onclick="updateStatus('${o.id}','CONFIRMED')" style="min-height:44px;">✅ Accept & Confirm</button>
                            <button class="act-btn act-danger" onclick="openRejectModal('${o.id}')" style="min-height:44px;">❌ Reject Order</button>
                        </div>`;
                } else if (o.status === 'NEW') {
                    actions = `
                        <div style="display:flex;gap:6px;flex-wrap:wrap;">
                            <button class="act-btn act-confirm" onclick="updateStatus('${o.id}','CONFIRMED')">✅ Confirm</button>
                            <button class="act-btn act-danger" onclick="updateStatus('${o.id}','CANCELLED')">❌ Reject</button>
                        </div>`;
                } else if (o.status === 'CONFIRMED') {
                    actions = `<button class="act-btn act-cook" onclick="updateStatus('${o.id}','IN_KITCHEN')">🔥 Send to Kitchen</button>`;
                } else if (o.status === 'IN_KITCHEN') {
                    actions = `<button class="act-btn act-confirm" onclick="updateStatus('${o.id}','READY')">✅ Mark Ready</button>`;
                } else if (o.status === 'READY' && o.type === 'delivery') {
                    const dpOptions = deliveryPeople.map(dp =>
                        `<option value="${dp.id}">${dp.name}</option>`).join('');
                    actions = `
                        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
                            <select class="input-field" id="dp_${o.id}" style="min-height:36px;padding:6px 10px;font-size:.8rem;flex:1;min-width:140px;">
                                <option value="">Select Rider</option>
                                ${dpOptions}
                            </select>
                            <button class="act-btn act-confirm" onclick="assignDelivery('${o.id}')">🛵 Assign</button>
                        </div>`;
                } else if (o.status === 'READY' && o.type === 'dine-in') {
                    actions = `<button class="act-btn act-confirm" onclick="updateStatus('${o.id}','COMPLETED')">✅ Mark as Served</button>`;
                } else if (o.status === 'OUT_FOR_DELIVERY') {
                    actions = `
                        <div style="font-size:.8rem;color:var(--muted);margin-bottom:6px;">🛵 Assigned to: ${dpName || 'N/A'}</div>
                        <button class="act-btn act-confirm" onclick="updateStatus('${o.id}','COMPLETED')">✅ Mark Delivered</button>`;
                }

                return `
                    <div class="card">
                        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
                            <div>
                                <h3 style="font-size:.95rem;color:var(--gold);">#${o.order_code}</h3>
                                <div style="font-size:.75rem;color:var(--muted);">${timeAgo(o.created_at)}</div>
                                ${o.type === 'delivery'
                                    ? '<span style="display:inline-block;padding:3px 10px;border-radius:9999px;font-size:.7rem;font-weight:600;background:#f9731625;color:#f97316;margin-top:4px;">🛵 DELIVERY</span>'
                                    : `<span style="display:inline-block;padding:3px 10px;border-radius:9999px;font-size:.7rem;font-weight:600;background:#d4a01720;color:#d4a017;margin-top:4px;">🪑 Table ${o.table_number || '?'}</span>`
                                }
                            </div>
                            <div style="text-align:right;">
                                ${statusBadge}
                                <div style="font-size:1rem;font-weight:700;color:var(--bright-gold);margin-top:4px;">${formatPrice(o.total)}</div>
                            </div>
                        </div>
                        <div style="font-size:.8rem;color:var(--muted);margin-bottom:6px;">👤 ${o.customer_name} · 📞 ${o.customer_phone}</div>
                        <div style="font-size:.78rem;color:var(--text);margin-bottom:${o.delivery_address ? '6' : '10'}px;opacity:.7;">${items || 'No items'}</div>
                        ${o.delivery_address ? `<div style="font-size:.9rem;color:var(--muted);margin-bottom:10px;">📍 ${o.delivery_address}</div>` : ''}
                        ${o.status === 'CANCELLED' && o.rejection_reason ? `<div style="font-size:.78rem;color:#fca5a5;margin-bottom:10px;background:#ef444410;padding:6px 10px;border-radius:8px;">Reason: ${o.rejection_reason}</div>` : ''}
                        ${actions}
                    </div>`;
            }).join('');
        }

        function getStatusBadge(status) {
            const map = {
                NEW: { bg: '#3b82f620', color: '#3b82f6', text: '🆕 NEW' },
                CONFIRMED: { bg: '#d4a01720', color: '#d4a017', text: '✅ CONFIRMED' },
                IN_KITCHEN: { bg: '#f9731620', color: '#f97316', text: '🔥 IN KITCHEN' },
                READY: { bg: '#22c55e20', color: '#22c55e', text: '✅ READY' },
                OUT_FOR_DELIVERY: { bg: '#8b5cf620', color: '#8b5cf6', text: '🛵 OUT FOR DELIVERY' },
                COMPLETED: { bg: '#22c55e20', color: '#22c55e', text: '✅ COMPLETED' },
                CANCELLED: { bg: '#ef444420', color: '#ef4444', text: '❌ CANCELLED' },
                SERVED: { bg: '#22c55e20', color: '#22c55e', text: '✅ SERVED' },
            };
            const s = map[status] || map.NEW;
            return `<span class="badge" style="background:${s.bg};color:${s.color};">${s.text}</span>`;
        }

        // ========== STATUS UPDATE ==========
        async function updateStatus(orderId, newStatus) {
            try {
                const { error } = await db
                    .from('orders')
                    .update({ status: newStatus })
                    .eq('id', orderId);

                if (error) {
                    showToast('Update failed', 'error');
                    console.error('[BVR] Update error:', error);
                    return;
                }

                if (newStatus === 'CONFIRMED') {
                    showToast('Order accepted! Sent to kitchen. ✅');
                } else {
                    showToast('Order updated ✅');
                }
                console.log('[BVR] Order', orderId, '→', newStatus);
                await loadOrders();

            } catch (err) {
                console.error('[BVR] Network error:', err);
                showToast('Network error. Try again.', 'error');
            }
        }

        // ========== REJECT ORDER WITH REASON ==========
        let rejectingOrderId = null;
        let selectedReason = '';

        function openRejectModal(orderId) {
            rejectingOrderId = orderId;
            selectedReason = '';
            document.getElementById('confirmRejectBtn').disabled = true;
            document.querySelectorAll('.reason-option').forEach(el => el.classList.remove('selected'));
            document.querySelectorAll('input[name="rejectReason"]').forEach(r => r.checked = false);
            document.getElementById('rejectOverlay').classList.add('open');
        }

        function closeRejectModal() {
            document.getElementById('rejectOverlay').classList.remove('open');
            rejectingOrderId = null;
            selectedReason = '';
        }

        function selectReason(el, reason) {
            selectedReason = reason;
            document.querySelectorAll('.reason-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('confirmRejectBtn').disabled = false;
        }

        async function confirmReject() {
            if (!rejectingOrderId || !selectedReason) return;

            const btn = document.getElementById('confirmRejectBtn');
            btn.disabled = true;
            btn.textContent = 'Rejecting...';

            try {
                const { error } = await db
                    .from('orders')
                    .update({
                        status: 'CANCELLED',
                        rejection_reason: selectedReason
                    })
                    .eq('id', rejectingOrderId);

                if (error) {
                    showToast('Failed to reject order', 'error');
                    console.error('[BVR] Reject error:', error);
                    btn.disabled = false;
                    btn.textContent = 'Confirm Reject';
                    return;
                }

                showToast('Order rejected ❌', 'info');
                closeRejectModal();
                await loadOrders();

            } catch (err) {
                console.error('[BVR] Network error:', err);
                showToast('Network error. Try again.', 'error');
                btn.disabled = false;
                btn.textContent = 'Confirm Reject';
            }
        }

        async function assignDelivery(orderId) {
            const sel = document.getElementById('dp_' + orderId);
            if (!sel || !sel.value) {
                showToast('Please select a delivery partner', 'error');
                return;
            }

            try {
                const { error } = await db
                    .from('orders')
                    .update({
                        delivery_person_id: sel.value,
                        status: 'OUT_FOR_DELIVERY'
                    })
                    .eq('id', orderId);

                if (error) {
                    showToast('Assignment failed', 'error');
                    console.error('[BVR] Assign error:', error);
                    return;
                }

                const dpName = deliveryPeople.find(d => d.id === sel.value)?.name || 'Rider';
                showToast(`🛵 ${dpName} assigned!`);
                await loadOrders();

            } catch (err) {
                console.error('[BVR] Network error:', err);
                showToast('Network error. Try again.', 'error');
            }
        }

        function updateStats() {
            const today = new Date().toDateString();
            const todayOrders = orders.filter(o => new Date(o.created_at).toDateString() === today);

            const pending = orders.filter(o => o.status === 'NEW').length;
            const active = orders.filter(o => ['CONFIRMED', 'IN_KITCHEN', 'READY', 'OUT_FOR_DELIVERY'].includes(o.status)).length;

            document.getElementById('countPending').textContent = pending;
            document.getElementById('countActive').textContent = active;
            document.getElementById('countToday').textContent = todayOrders.length;

            const revenue = todayOrders
                .filter(o => !['CANCELLED'].includes(o.status))
                .reduce((sum, o) => sum + (o.total || 0), 0);
            document.getElementById('revenueTotal').textContent = formatPrice(revenue);

            // Update filter counts
            const filterBtns = document.querySelectorAll('.filter-btn');
            const counts = {
                all: orders.length,
                new: pending,
                active: active,
                ready: orders.filter(o => ['READY', 'OUT_FOR_DELIVERY'].includes(o.status)).length,
                completed: orders.filter(o => ['COMPLETED', 'SERVED', 'CANCELLED'].includes(o.status)).length
            };
            filterBtns.forEach(btn => {
                const f = btn.dataset.filter;
                const labels = { all: 'All', new: '🆕 New', active: '🔥 Active', ready: '✅ Ready', completed: '🏁 Done' };
                btn.textContent = `${labels[f]} (${counts[f] || 0})`;
            });
        }

        function checkNewOrderAlert() {
            const newCount = orders.filter(o => o.status === 'NEW').length;
            if (newCount > prevNewCount && prevNewCount >= 0) {
                showToast('🔔 New order received!', 'info');
                document.title = `(${newCount}) BVR Owner Dashboard`;
                const pendingEl = document.getElementById('statPending');
                if (pendingEl) {
                    pendingEl.classList.remove('pulse-gold');
                    void pendingEl.offsetWidth;
                    pendingEl.classList.add('pulse-gold');
                    setTimeout(() => pendingEl.classList.remove('pulse-gold'), 1000);
                }
            } else if (newCount === 0) {
                document.title = 'BVR Owner Dashboard';
            }
            prevNewCount = newCount;
        }

        // ========== OWNER TABS ==========
        function switchOwnerTab(tab) {
            document.getElementById('ordersTab').style.display = tab === 'orders' ? 'block' : 'none';
            document.getElementById('menuTab').style.display = tab === 'menu' ? 'block' : 'none';
            document.getElementById('tabOrders').classList.toggle('active', tab === 'orders');
            document.getElementById('tabMenu').classList.toggle('active', tab === 'menu');
            if (tab === 'menu') loadMenuManagement();
        }

        // ========== MENU MANAGEMENT (Feature 2) ==========
        let managedItems = [];
        let menuCatFilter = 'all';

        async function loadMenuManagement() {
            try {
                const { data: items, error } = await db
                    .from('menu_items')
                    .select('*, menu_categories(name)')
                    .order('category_id');

                if (error) {
                    showToast('Failed to load menu', 'error');
                    return;
                }

                managedItems = items || [];
                renderMenuCatTabs();
                renderMenuItems();
                updateAvailability();
            } catch (err) {
                showToast('Network error loading menu', 'error');
            }
        }

        function renderMenuCatTabs() {
            const wrap = document.getElementById('menuCatWrap');
            const cats = [...new Set(managedItems.map(i => i.menu_categories?.name).filter(Boolean))];
            let html = `<button class="filter-btn ${menuCatFilter === 'all' ? 'active' : ''}" data-mcat="all" onclick="setMenuCatFilter('all')">All (${managedItems.length})</button>`;
            cats.forEach(cat => {
                const count = managedItems.filter(i => i.menu_categories?.name === cat).length;
                const active = menuCatFilter === cat ? 'active' : '';
                html += `<button class="filter-btn ${active}" data-mcat="${cat}" onclick="setMenuCatFilter('${cat}')">${cat} (${count})</button>`;
            });
            wrap.innerHTML = html;
        }

        function setMenuCatFilter(cat) {
            menuCatFilter = cat;
            renderMenuCatTabs();
            renderMenuItems();
        }

        function renderMenuItems() {
            const container = document.getElementById('menuItemsList');
            let items = menuCatFilter === 'all' ? managedItems : managedItems.filter(i => i.menu_categories?.name === menuCatFilter);

            if (items.length === 0) {
                container.innerHTML = '<div class="card" style="text-align:center;padding:30px;color:var(--muted);">No items found</div>';
                return;
            }

            container.innerHTML = '<div class="card" style="padding:8px 16px;">' + items.map(item => {
                const catName = item.menu_categories?.name || 'Other';
                const imgHtml = item.image_url
                    ? `<div class="menu-item-thumb"><img src="${item.image_url}" alt="${item.name}" onerror="this.parentElement.innerHTML='🍽️';"></div>`
                    : `<div class="menu-item-thumb">🍽️</div>`;

                const checked = item.is_available ? 'checked' : '';
                const statusDot = item.is_available
                    ? '<span style="color:#22c55e;font-size:.78rem;">● Available</span>'
                    : '<span style="color:#ef4444;font-size:.78rem;">● Unavailable</span>';

                return `
                    <div class="menu-item-row">
                        ${imgHtml}
                        <div style="flex:1;min-width:0;">
                            <div style="font-weight:600;font-size:.9rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${item.name}</div>
                            <div style="font-size:.75rem;color:var(--muted);">${catName}</div>
                            ${statusDot}
                        </div>
                        <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">
                            <span style="font-weight:700;color:var(--bright-gold);font-size:.9rem;">₹${item.price}</span>
                            <label class="toggle-switch">
                                <input type="checkbox" ${checked} onchange="toggleItem('${item.id}', this.checked)">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                    </div>`;
            }).join('') + '</div>';
        }

        async function toggleItem(itemId, newValue) {
            try {
                const { error } = await db
                    .from('menu_items')
                    .update({ is_available: newValue })
                    .eq('id', itemId);

                if (error) {
                    showToast('Update failed', 'error');
                    loadMenuManagement();
                    return;
                }

                const item = managedItems.find(i => i.id === itemId);
                if (item) item.is_available = newValue;

                const msg = newValue ? 'Marked Available ✅' : 'Marked Unavailable ❌';
                showToast(msg, newValue ? 'success' : 'info');
                updateAvailability();

            } catch (err) {
                showToast('Network error', 'error');
                loadMenuManagement();
            }
        }

        function updateAvailability() {
            const avail = managedItems.filter(i => i.is_available).length;
            const unavail = managedItems.length - avail;
            document.getElementById('availCount').textContent = avail;
            document.getElementById('unavailCount').textContent = unavail;
        }

        // ========== AUTO REFRESH ==========
        setInterval(async () => {
            if (isLoggedIn) {
                await loadOrders();
            }
        }, 10000);

        // ========== INIT ==========
        checkAuth();
        loadDeliveryPeople();
        console.log('[BVR] Owner dashboard loaded');
    </script>
</body>

</html>
