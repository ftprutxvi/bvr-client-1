<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BVR Owner Dashboard</title>
    <meta name="description" content="Owner dashboard for BVR Bangaru Vakili Restaurant. Manage orders." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap');

        :root {
            --bg: #0a0500;
            --card-bg: #1a0e00;
            --border: #d4a01740;
            --gold: #d4a017;
            --bright-gold: #f5c842;
            --text: #f5e6c8;
            --muted: #a07840;
            --green: #22c55e;
            --red: #ef4444
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden
        }

        h1,
        h2,
        h3 {
            font-family: 'Playfair Display', serif
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: #0a050095;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 16px;
            margin-bottom: 12px
        }

        .btn-gold {
            background: linear-gradient(135deg, #d4a017, #f5c842);
            color: #1a0e00;
            font-weight: 700;
            border-radius: 9999px;
            min-height: 48px;
            padding: 12px 24px;
            border: none;
            cursor: pointer;
            transition: all .2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            text-decoration: none;
            width: 100%
        }

        .btn-gold:hover {
            box-shadow: 0 0 25px #d4a01780;
            transform: translateY(-2px)
        }

        .input-field {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #0f0700;
            color: var(--text);
            font-size: .95rem;
            font-family: 'Poppins', sans-serif;
            min-height: 48px;
            outline: none;
            transition: border-color .2s
        }

        .input-field:focus {
            border-color: var(--gold)
        }

        .input-field::placeholder {
            color: #a0784080
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 16px
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            text-align: center
        }

        .stat-num {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--bright-gold);
            font-family: 'Playfair Display', serif
        }

        .stat-label {
            font-size: .7rem;
            color: var(--muted)
        }

        /* Filter tabs */
        .filter-wrap {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 8px 0;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 12px
        }

        .filter-wrap::-webkit-scrollbar {
            display: none
        }

        .filter-btn {
            flex-shrink: 0;
            padding: 6px 14px;
            border-radius: 9999px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-size: .8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s;
            font-family: 'Poppins', sans-serif;
            white-space: nowrap
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #d4a017, #f5c842);
            color: #1a0e00;
            border-color: transparent
        }

        /* Action buttons */
        .act-btn {
            padding: 8px 14px;
            border-radius: 9999px;
            border: none;
            font-size: .78rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            min-height: 36px;
            font-family: 'Poppins', sans-serif
        }

        .act-confirm {
            background: #22c55e30;
            color: #22c55e
        }

        .act-cook {
            background: #f9731620;
            color: #f97316
        }

        .act-danger {
            background: #ef444420;
            color: #ef4444
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 9999px;
            font-size: .7rem;
            font-weight: 600;
            white-space: nowrap
        }

        /* Login overlay */
        .login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .9);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px
        }

        .login-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 32px;
            max-width: 360px;
            width: 100%
        }

        .login-box h2 {
            color: var(--gold);
            text-align: center;
            margin-bottom: 20px
        }

        .logout-link {
            color: var(--muted);
            text-decoration: none;
            font-size: .9rem
        }

        /* Skeleton loading */
        .skeleton-box {
            background: linear-gradient(90deg, #1a0e00 25%, #2a1800 50%, #1a0e00 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        /* Pulse gold animation for new order alert */
        @keyframes pulseGold {
            0% {
                box-shadow: 0 0 0 0 rgba(212, 160, 23, 0.7);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(212, 160, 23, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(212, 160, 23, 0);
            }
        }

        .pulse-gold {
            animation: pulseGold 1s ease-out;
        }
    </style>
</head>

<body>

    <!-- LOGIN OVERLAY -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>🔐 Owner Login</h2>
            <div style="display:flex;flex-direction:column;gap:12px;">
                <input type="email" class="input-field" id="loginEmail" placeholder="Email" autocomplete="email" />
                <input type="password" class="input-field" id="loginPassword" placeholder="Password"
                    autocomplete="current-password" />
                <button class="btn-gold" onclick="handleLogin()">🔓 Login</button>
                <p id="loginErr" style="color:var(--red);font-size:.8rem;text-align:center;display:none;"></p>
            </div>
        </div>
    </div>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div style="max-width:1200px;margin:auto;display:flex;align-items:center;justify-content:space-between;">
            <h1 style="font-size:1.15rem;color:#d4a017;">👑 Owner Dashboard</h1>
            <a href="#" onclick="handleLogout()" class="logout-link">Logout ↗</a>
        </div>
    </nav>

    <main style="padding:80px 16px 32px;max-width:800px;margin:auto;">

        <!-- STATS -->
        <div class="stats-grid">
            <div class="stat-card" id="statPending">
                <div class="stat-num" id="countPending">0</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="countActive">0</div>
                <div class="stat-label">Active</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="countToday">0</div>
                <div class="stat-label">Today</div>
            </div>
        </div>

        <!-- REVENUE -->
        <div class="card" style="text-align:center;">
            <div style="font-size:.8rem;color:var(--muted);">Today's Revenue</div>
            <div style="font-size:1.8rem;font-weight:700;color:var(--bright-gold);font-family:'Playfair Display',serif;"
                id="revenueTotal">₹0</div>
        </div>

        <!-- FILTER -->
        <div class="filter-wrap" id="filterWrap">
            <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
            <button class="filter-btn" data-filter="new" onclick="setFilter('new')">🆕 New</button>
            <button class="filter-btn" data-filter="active" onclick="setFilter('active')">🔥 Active</button>
            <button class="filter-btn" data-filter="ready" onclick="setFilter('ready')">✅ Ready</button>
            <button class="filter-btn" data-filter="completed" onclick="setFilter('completed')">🏁 Done</button>
        </div>

        <!-- ORDERS LIST -->
        <div id="ordersContainer">
            <!-- Skeleton cards -->
            <div class="card">
                <div class="skeleton-box" style="height:20px;width:40%;margin-bottom:10px;"></div>
                <div class="skeleton-box" style="height:14px;width:70%;margin-bottom:6px;"></div>
                <div class="skeleton-box" style="height:14px;width:50%;"></div>
            </div>
            <div class="card">
                <div class="skeleton-box" style="height:20px;width:40%;margin-bottom:10px;"></div>
                <div class="skeleton-box" style="height:14px;width:70%;margin-bottom:6px;"></div>
                <div class="skeleton-box" style="height:14px;width:50%;"></div>
            </div>
            <div class="card">
                <div class="skeleton-box" style="height:20px;width:40%;margin-bottom:10px;"></div>
                <div class="skeleton-box" style="height:14px;width:70%;margin-bottom:6px;"></div>
                <div class="skeleton-box" style="height:14px;width:50%;"></div>
            </div>
        </div>

        <!-- AUTO REFRESH NOTE -->
        <p style="text-align:center;color:var(--muted);font-size:.75rem;margin-top:16px;">
            🔄 Auto-refreshes every 10 seconds
        </p>

    </main>

    <script>
        // ========== SUPABASE INIT ==========
        const SUPABASE_URL = 'https://feglxiibeuzsahoevzuu.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZlZ2x4aWliZXV6c2Fob2V2enV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTg3MzMsImV4cCI6MjA4ODc5NDczM30.GhrRdA0q4jFKDCJaw4CNFsz3tag4mZiVqvhx2NsaL9U';
        const { createClient } = supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ========== SHARED UTILITIES ==========
        function formatPrice(amount) { return '₹' + amount; }
        function formatTime(isoString) {
            try { return new Date(isoString).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }); }
            catch (e) { return '—'; }
        }
        function timeAgo(isoString) {
            try {
                const diff = Math.floor((Date.now() - new Date(isoString).getTime()) / 1000);
                if (diff < 60) return diff + 's ago';
                if (diff < 3600) return Math.floor(diff / 60) + ' mins ago';
                if (diff < 86400) return Math.floor(diff / 3600) + ' hrs ago';
                return Math.floor(diff / 86400) + ' days ago';
            } catch (e) { return '—'; }
        }
        function showToast(message, type = 'success') {
            const existing = document.getElementById('bvr-toast');
            if (existing) existing.remove();
            const colors = { success: '#d4a017', error: '#ef4444', info: '#3b82f6' };
            const toast = document.createElement('div');
            toast.id = 'bvr-toast';
            toast.textContent = message;
            Object.assign(toast.style, {
                position: 'fixed', bottom: '80px', left: '50%', transform: 'translateX(-50%)',
                background: colors[type] || colors.success, color: type === 'success' ? '#1a0e00' : '#fff',
                padding: '10px 24px', borderRadius: '9999px', fontFamily: "'Poppins',sans-serif",
                fontSize: '.85rem', fontWeight: '600', zIndex: '999', whiteSpace: 'nowrap',
                boxShadow: '0 4px 20px rgba(0,0,0,0.4)', transition: 'opacity 0.3s ease', opacity: '1'
            });
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        // ========== AUTH ==========
        let isLoggedIn = false;

        function checkAuth() {
            const session = localStorage.getItem('bvr_staff_session');
            if (session === 'owner_active') {
                isLoggedIn = true;
                document.getElementById('loginOverlay').style.display = 'none';
                loadOrders();
            }
        }

        function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errEl = document.getElementById('loginErr');
            errEl.style.display = 'none';

            if (email === 'owner@bvr.com' && password === 'bvr@owner123') {
                localStorage.setItem('bvr_staff_session', 'owner_active');
                isLoggedIn = true;
                document.getElementById('loginOverlay').style.display = 'none';
                showToast('Welcome, Owner!');
                loadOrders();
            } else {
                errEl.textContent = 'Invalid email or password';
                errEl.style.display = 'block';
            }
        }

        function handleLogout() {
            localStorage.removeItem('bvr_staff_session');
            isLoggedIn = false;
            document.getElementById('loginOverlay').style.display = 'flex';
            document.title = 'BVR Owner Dashboard';
        }

        // Login on Enter key
        document.getElementById('loginPassword').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleLogin();
        });

        // ========== ORDERS ==========
        let orders = [];
        let deliveryPeople = [];
        let currentFilter = 'all';
        let prevNewCount = 0;

        async function loadOrders() {
            try {
                const { data, error } = await db
                    .from('orders')
                    .select('*, order_items(*), delivery_people(name, phone)')
                    .order('created_at', { ascending: false });

                if (error) {
                    showToast('Failed to load orders', 'error');
                    console.error('[BVR] Orders fetch error:', error);
                    return;
                }

                orders = data || [];
                renderOrders();
                updateStats();
                checkNewOrderAlert();

                console.log('[BVR] Orders loaded from Supabase:', orders.length);

            } catch (err) {
                console.error('[BVR] Network error:', err);
                showToast('No internet. Retrying in 5s...', 'error');
                setTimeout(loadOrders, 5000);
            }
        }

        async function loadDeliveryPeople() {
            try {
                const { data } = await db
                    .from('delivery_people')
                    .select('*')
                    .eq('is_active', true);
                deliveryPeople = data || [];
            } catch (err) {
                console.error('[BVR] Delivery people fetch error:', err);
            }
        }

        function getFilteredOrders() {
            if (currentFilter === 'all') return orders;
            if (currentFilter === 'new') return orders.filter(o => o.status === 'NEW');
            if (currentFilter === 'active') return orders.filter(o => ['CONFIRMED', 'IN_KITCHEN'].includes(o.status));
            if (currentFilter === 'ready') return orders.filter(o => ['READY', 'OUT_FOR_DELIVERY'].includes(o.status));
            if (currentFilter === 'completed') return orders.filter(o => ['COMPLETED', 'SERVED', 'CANCELLED'].includes(o.status));
            return orders;
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.filter === filter);
            });
            renderOrders();
        }

        function renderOrders() {
            const container = document.getElementById('ordersContainer');
            const filtered = getFilteredOrders();

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="card" style="text-align:center;padding:40px 20px;">
                        <div style="font-size:2.5rem;margin-bottom:12px;">🍽️</div>
                        <h3 style="color:var(--gold);font-size:1.1rem;margin-bottom:8px;">No orders yet today</h3>
                        <p style="color:var(--muted);font-size:.85rem;">Waiting for first order...</p>
                    </div>`;
                return;
            }

            container.innerHTML = filtered.map(o => {
                const items = (o.order_items || []).map(i => `${i.item_name} ×${i.quantity}`).join(', ');
                const dpName = o.delivery_people ? o.delivery_people.name : null;

                // Status badge
                const statusBadge = getStatusBadge(o.status);

                // Actions
                let actions = '';
                if (o.status === 'NEW') {
                    actions = `
                        <div style="display:flex;gap:6px;flex-wrap:wrap;">
                            <button class="act-btn act-confirm" onclick="updateStatus('${o.id}','CONFIRMED')">✅ Confirm</button>
                            <button class="act-btn act-danger" onclick="updateStatus('${o.id}','CANCELLED')">❌ Reject</button>
                        </div>`;
                } else if (o.status === 'CONFIRMED') {
                    actions = `<button class="act-btn act-cook" onclick="updateStatus('${o.id}','IN_KITCHEN')">🔥 Send to Kitchen</button>`;
                } else if (o.status === 'IN_KITCHEN') {
                    actions = `<button class="act-btn act-confirm" onclick="updateStatus('${o.id}','READY')">✅ Mark Ready</button>`;
                } else if (o.status === 'READY' && o.type === 'delivery') {
                    const dpOptions = deliveryPeople.map(dp =>
                        `<option value="${dp.id}">${dp.name}</option>`).join('');
                    actions = `
                        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
                            <select class="input-field" id="dp_${o.id}" style="min-height:36px;padding:6px 10px;font-size:.8rem;flex:1;min-width:140px;">
                                <option value="">Select Rider</option>
                                ${dpOptions}
                            </select>
                            <button class="act-btn act-confirm" onclick="assignDelivery('${o.id}')">🛵 Assign</button>
                        </div>`;
                } else if (o.status === 'READY' && o.type === 'dine-in') {
                    actions = `<button class="act-btn act-confirm" onclick="updateStatus('${o.id}','COMPLETED')">✅ Mark as Served</button>`;
                } else if (o.status === 'OUT_FOR_DELIVERY') {
                    actions = `
                        <div style="font-size:.8rem;color:var(--muted);margin-bottom:6px;">🛵 Assigned to: ${dpName || 'N/A'}</div>
                        <button class="act-btn act-confirm" onclick="updateStatus('${o.id}','COMPLETED')">✅ Mark Delivered</button>`;
                }

                return `
                    <div class="card">
                        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
                            <div>
                                <h3 style="font-size:.95rem;color:var(--gold);">#${o.order_code}</h3>
                                <div style="font-size:.75rem;color:var(--muted);">${timeAgo(o.created_at)} · ${o.type === 'delivery' ? '🛵 Delivery' : '🪑 Table ' + (o.table_number || '?')}</div>
                            </div>
                            <div style="text-align:right;">
                                ${statusBadge}
                                <div style="font-size:1rem;font-weight:700;color:var(--bright-gold);margin-top:4px;">${formatPrice(o.total)}</div>
                            </div>
                        </div>
                        <div style="font-size:.8rem;color:var(--muted);margin-bottom:6px;">👤 ${o.customer_name} · 📞 ${o.customer_phone}</div>
                        <div style="font-size:.78rem;color:var(--text);margin-bottom:10px;opacity:.7;">${items || 'No items'}</div>
                        ${o.delivery_address ? `<div style="font-size:.75rem;color:var(--muted);margin-bottom:10px;">📍 ${o.delivery_address}</div>` : ''}
                        ${actions}
                    </div>`;
            }).join('');
        }

        function getStatusBadge(status) {
            const map = {
                NEW: { bg: '#3b82f620', color: '#3b82f6', text: '🆕 NEW' },
                CONFIRMED: { bg: '#d4a01720', color: '#d4a017', text: '✅ CONFIRMED' },
                IN_KITCHEN: { bg: '#f9731620', color: '#f97316', text: '🔥 IN KITCHEN' },
                READY: { bg: '#22c55e20', color: '#22c55e', text: '✅ READY' },
                OUT_FOR_DELIVERY: { bg: '#8b5cf620', color: '#8b5cf6', text: '🛵 OUT FOR DELIVERY' },
                COMPLETED: { bg: '#22c55e20', color: '#22c55e', text: '✅ COMPLETED' },
                CANCELLED: { bg: '#ef444420', color: '#ef4444', text: '❌ CANCELLED' },
                SERVED: { bg: '#22c55e20', color: '#22c55e', text: '✅ SERVED' },
            };
            const s = map[status] || map.NEW;
            return `<span class="badge" style="background:${s.bg};color:${s.color};">${s.text}</span>`;
        }

        // ========== STATUS UPDATE ==========
        async function updateStatus(orderId, newStatus) {
            try {
                const { error } = await db
                    .from('orders')
                    .update({ status: newStatus })
                    .eq('id', orderId);

                if (error) {
                    showToast('Update failed', 'error');
                    console.error('[BVR] Update error:', error);
                    return;
                }

                showToast('Order updated ✅');
                console.log('[BVR] Order', orderId, '→', newStatus);
                await loadOrders();

            } catch (err) {
                console.error('[BVR] Network error:', err);
                showToast('Network error. Try again.', 'error');
            }
        }

        async function assignDelivery(orderId) {
            const sel = document.getElementById('dp_' + orderId);
            if (!sel || !sel.value) {
                showToast('Please select a delivery partner', 'error');
                return;
            }

            try {
                const { error } = await db
                    .from('orders')
                    .update({
                        delivery_person_id: sel.value,
                        status: 'OUT_FOR_DELIVERY'
                    })
                    .eq('id', orderId);

                if (error) {
                    showToast('Assignment failed', 'error');
                    console.error('[BVR] Assign error:', error);
                    return;
                }

                const dpName = deliveryPeople.find(d => d.id === sel.value)?.name || 'Rider';
                showToast(`🛵 ${dpName} assigned!`);
                await loadOrders();

            } catch (err) {
                console.error('[BVR] Network error:', err);
                showToast('Network error. Try again.', 'error');
            }
        }

        function updateStats() {
            const today = new Date().toDateString();
            const todayOrders = orders.filter(o => new Date(o.created_at).toDateString() === today);

            const pending = orders.filter(o => o.status === 'NEW').length;
            const active = orders.filter(o => ['CONFIRMED', 'IN_KITCHEN', 'READY', 'OUT_FOR_DELIVERY'].includes(o.status)).length;

            document.getElementById('countPending').textContent = pending;
            document.getElementById('countActive').textContent = active;
            document.getElementById('countToday').textContent = todayOrders.length;

            const revenue = todayOrders
                .filter(o => !['CANCELLED'].includes(o.status))
                .reduce((sum, o) => sum + (o.total || 0), 0);
            document.getElementById('revenueTotal').textContent = formatPrice(revenue);

            // Update filter counts
            const filterBtns = document.querySelectorAll('.filter-btn');
            const counts = {
                all: orders.length,
                new: pending,
                active: active,
                ready: orders.filter(o => ['READY', 'OUT_FOR_DELIVERY'].includes(o.status)).length,
                completed: orders.filter(o => ['COMPLETED', 'SERVED', 'CANCELLED'].includes(o.status)).length
            };
            filterBtns.forEach(btn => {
                const f = btn.dataset.filter;
                const labels = { all: 'All', new: '🆕 New', active: '🔥 Active', ready: '✅ Ready', completed: '🏁 Done' };
                btn.textContent = `${labels[f]} (${counts[f] || 0})`;
            });
        }

        function checkNewOrderAlert() {
            const newCount = orders.filter(o => o.status === 'NEW').length;
            if (newCount > prevNewCount && prevNewCount >= 0) {
                showToast('🔔 New order received!', 'info');
                document.title = `(${newCount}) BVR Owner Dashboard`;
                const pendingEl = document.getElementById('statPending');
                if (pendingEl) {
                    pendingEl.classList.remove('pulse-gold');
                    void pendingEl.offsetWidth;
                    pendingEl.classList.add('pulse-gold');
                    setTimeout(() => pendingEl.classList.remove('pulse-gold'), 1000);
                }
            } else if (newCount === 0) {
                document.title = 'BVR Owner Dashboard';
            }
            prevNewCount = newCount;
        }

        // ========== AUTO REFRESH ==========
        setInterval(async () => {
            if (isLoggedIn) {
                await loadOrders();
            }
        }, 10000);

        // ========== INIT ==========
        checkAuth();
        loadDeliveryPeople();
        console.log('[BVR] Owner dashboard loaded');
    </script>
</body>

</html>
